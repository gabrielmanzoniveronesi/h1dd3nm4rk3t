<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ShadowMarket - Marketplace</title>
    <style>
        body {
            margin: 0;
            background: #010101;
            font-family: monospace;
            color: #00ffcc;
            overflow-x: hidden;
            position: relative;
        }

        h1 {
            text-align: center;
            padding: 20px;
            text-shadow: 0 0 15px #00ffcc;
            animation: flicker 2s infinite;
        }


        @keyframes flicker {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
            51% { opacity: 0.51; content: "/63"; }
        }

        .market {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
            padding: 20px;
        }

        .product {
            background: rgba(0, 0, 0, 0.85);
            border: 2px solid #00ffcc;
            width: 200px;
            height: 150px;
            overflow: hidden;
            position: relative;
            transition: all 0.5s ease;
            cursor: pointer;
            box-shadow: 0 0 10px #00ffcc;
            border-radius: 8px;
        }

        .product:hover {
            height: 370px;
            box-shadow: 0 0 35px #00ffcc, 0 0 60px #ff00ff;
            transform: scale(1.05) rotateZ(-1deg);
        }

        .product img {
            width: 100%;
            height: 100px;
            object-fit: cover;
            background: #111;
            transition: all 0.3s ease;
        }

        .product:hover img {
            filter: drop-shadow(0 0 10px #ff00ff) drop-shadow(0 0 20px #00ffcc);
            transform: translateX(-2px) skewX(-2deg);
        }

        .product h3 {
            margin: 5px;
            font-size: 16px;
            text-shadow: 0 0 5px #00ffcc, 0 0 10px #ff00ff;
            transition: 0.3s;
        }

        .product:hover h3 {
            text-shadow: 0 0 10px #ff00ff, 0 0 15px #00ffcc, 0 0 20px #ff00ff;
        }

        .product .info {
            padding: 5px;
            font-size: 13px;
            color: #ff00ff;
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.9);
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 0.5s ease, opacity 0.5s ease;
        }

        .product:hover .info {
            max-height: 200px;
            opacity: 1;
        }

        body::before {
            content: '';
            position: fixed;
            width: 200%;
            height: 200%;
            background: repeating-linear-gradient(
                45deg,
                rgba(0, 255, 255, 0.05),
                rgba(0, 255, 255, 0.05) 2px,
                transparent 2px,
                transparent 4px
            );
            animation: slideBG 15s linear infinite;
            pointer-events: none;
        }

        body::after {
            content: "dev";
            color: #010101;
            position: absolute;
            left: -9999px;
        }

        @keyframes slideBG {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-50%, -50%); }
        }
    </style>
</head>
<body>
    <h1>UNDERGROUND MARKET</h1>

    <div class="market">
        <div class="product">
            <img src="yamu_jay-ai-generated-9088888.jpg" alt="Database Leak v1">
            <h3>Database Leak v1</h3>
            <div class="info">
                Massive data dump.<br>
                Seller: ShadowQueen
            </div>
        </div>

        <div class="product">
            <img src="creatorish-mask-6852866.png" alt="Netflix Premium Accounts">
            <h3>Netflix Premium Accounts</h3>
            <div class="info">
                Shared premium logins.<br>
                Seller: ZeroCool
            </div>
        </div>

        <div class="product">
            <img src="raphaelsilva-steam-3384020.svg" alt="Steam Accounts Pack">
            <h3>Steam Accounts Pack</h3>
            <div class="info">
                Various Steam accounts.<br>
                Seller: GhostKey
            </div>
        </div>
    </div>

    <script>
        let fake = ["access", "denied", "shadow", "market"];
        console.log(fake[Math.floor(Math.random() * fake.length)]);
    </script>
</body>
</html>
